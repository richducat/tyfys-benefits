name: VA Document Finder
options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: WN3K69XEP4
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  VA Document Finder:
    type: application
    platform: iOS
    sources:
      - path: VA Document Finder/Sources
      - path: VA Document Finder/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digitalsync.vadocumentfinder
        PRODUCT_NAME: VA Doc Finder
        INFOPLIST_FILE: VA Document Finder/Resources/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: VA Doc Finder
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: "NO"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
      configs:
        Release:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: ""
    scheme:
      testTargets:
        - VA Document Finder UITests
  VA Document Finder UITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: VA Document Finder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digitalsync.vadocumentfinder.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: VA Document Finder
