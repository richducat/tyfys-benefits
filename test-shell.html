  <script>
    (function () {
      // Intercept fetch to mock backend auth for the Beta Tester
      const originalFetch = window.fetch;
      window.fetch = async function(resource, init) {
        const url = typeof resource === 'string' ? resource : (resource?.url || '');
        
        if (url.includes('/api/auth-session') || url.includes('/api/auth-login')) {
          return new Response(JSON.stringify({
            authenticated: true,
            account: {
              userId: "beta_tester",
              email: "beta@test.com",
              displayName: "Beta Tester",
              leadId: "beta_lead"
            },
            appState: {
              hasStarted: true,
              onboardingComplete: true,
              userProfile: {
                firstName: "Beta",
                lastName: "Tester",
                email: "beta@test.com",
                phone: "(555) 555-5555",
                branch: "Marines",
                rating: 0,
                selectedServiceProgramId: "standard_no_ptsd_headaches",
                serviceAgreementAcceptedAt: new Date().toISOString(),
                serviceAgreementVersion: "2026-02-23"
              },
              onboardingNotes: "marines, female, age 43" // The AI agent wants "no claims filled out yet" defaults.
            }
          }), {
            status: 200,
            headers: { 'Content-Type': 'application/json' }
          });
        }
        
        // Mock any dashboard data saves
        if (url.includes('/api/')) {
          return new Response(JSON.stringify({ ok: true }), {
            status: 200,
            headers: { 'Content-Type': 'application/json' }
          });
        }

        return originalFetch.apply(window, arguments);
      };

      // Set auth keys to avoid initial redirect to login
      window.localStorage.setItem('tyfys.appSessionToken.v1', 'mock_token_beta_tester');
      window.localStorage.setItem('tyfys.appAuth.v1', JSON.stringify({
        email: 'beta@test.com',
        displayName: 'Beta Tester'
      }));
    })();
  </script>

        hostname.endsWith(".vercel-dns.com");

  <script>
    (function () {
      const lockedViewport =
        "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover";
      const syncViewport = () => {
        const viewport = document.querySelector('meta[name="viewport"]');
        if (viewport && viewport.getAttribute("content") !== lockedViewport) {
          viewport.setAttribute("content", lockedViewport);
        }
      };
      const preventZoomGesture = (event) => {
        event.preventDefault();
      };
      const preventMultiTouchZoom = (event) => {
        if (event.touches && event.touches.length > 1) {
          event.preventDefault();
        }
      };
      let lastTouchEndAt = 0;

      syncViewport();
      document.addEventListener("DOMContentLoaded", syncViewport);
      document.addEventListener("gesturestart", preventZoomGesture, { passive: false });
      document.addEventListener("gesturechange", preventZoomGesture, { passive: false });
      document.addEventListener("gestureend", preventZoomGesture, { passive: false });
      document.addEventListener("touchmove", preventMultiTouchZoom, { passive: false });
      document.addEventListener(
        "touchend",
        (event) => {
          const now = Date.now();
          if (now - lastTouchEndAt <= 300) {
            event.preventDefault();
          }
          lastTouchEndAt = now;
        },
        { passive: false }
      );
    })();
  </script>
