<!-- SEO END -->
<script>
      (function () {
        const appComingSoonUrl = "https://tyfys.net/app-coming-soon.html";
        const hostname = String(window.location.hostname || "").toLowerCase();
        const isLocalRuntime = hostname === "localhost" || hostname === "127.0.0.1";
        const isBackendHost =
          hostname === "app.tyfys.net" ||
          hostname === "www.app.tyfys.net" ||
          hostname === "api.tyfys.net" ||
          hostname === "www.api.tyfys.net";
        const target = new URL(
          isLocalRuntime ? "/app-shell.html" : isBackendHost ? appComingSoonUrl : "/app-coming-soon.html",
          window.location.href
        );
        const current = new URL(window.location.href);
        current.searchParams.forEach((value, key) => target.searchParams.set(key, value));
        if (!target.searchParams.has("source")) target.searchParams.set("source", "intake-page");
        window.location.replace(target.toString());
      })();
    </script>
