<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TYFYS VA Rating Calculator</title>
  <meta
    name="description"
    content="Use TYFYS's advanced VA rating calculator to model combined ratings, exact VA math rounding, compensation impact, and your path to 100%."
  >
  <meta http-equiv="refresh" content="0; url=/app-coming-soon.html?source=calculator-page">
  <link rel="canonical" href="https://tyfys.net/calculator.html">
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #020617;
      color: #f8fafc;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    main {
      max-width: 40rem;
    }

    a {
      color: #facc15;
      font-weight: 700;
    }
  </style>
  <script>
    (function () {
      const hostname = String(window.location.hostname || "").toLowerCase();
      const isLocalRuntime = hostname === "localhost" || hostname === "127.0.0.1";
      const target = isLocalRuntime ? "/app-shell.html?tool=calculator" : "/app-coming-soon.html?source=calculator-page";
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <main>
    <h1>Opening the TYFYS app update page</h1>
    <p>You are being redirected to the latest TYFYS app status page.</p>
    <p>If nothing happens, <a href="/app-coming-soon.html?source=calculator-page">continue here</a>.</p>
  </main>
</body>
</html>
