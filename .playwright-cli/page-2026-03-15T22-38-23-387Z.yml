  - generic [ref=e176]:
    - generic [ref=e177]:
      - text: The Hard Truth
      - heading "Why You Need a Nexus Letter & DBQ" [level=2] [ref=e178]
      - paragraph [ref=e179]: You served honorably. You have the injuries. But the VA requires a Nexus Letter and a fully documented DBQ to prove Service Connection. Without them, your claim is dead on arrival.
    - generic [ref=e180]:
      - generic [ref=e181]:
        - generic [ref=e182]:
          - img [ref=e184]
          - heading "The Attorney Trap" [level=3] [ref=e188]
        - paragraph [ref=e189]:
          - text: Lawyers typically take
          - strong [ref=e190]: 20-33% of your backpay
          - text: . Because they get paid from backpay, they are financially incentivized to drag your case out for years.
        - generic [ref=e191]:
          - img [ref=e192]
          - generic [ref=e194]: We charge a flat fee. No percentages.
      - generic [ref=e195]:
        - generic [ref=e196]:
          - img [ref=e198]
          - heading "The VSO Limitation" [level=3] [ref=e200]
        - paragraph [ref=e201]: VSOs are free and well-meaning, but they cannot write independent medical opinions. They rely on VA doctors (C&P exams) to rate you, and relying only on those exams is a big reason many claims are denied or underrated.
        - generic [ref=e202]:
          - img [ref=e203]
          - generic [ref=e205]: We provide private medical opinions.
      - generic [ref=e206]:
        - generic [ref=e207]:
          - img [ref=e209]
          - heading "The \"Service Connection\" Gap" [level=3] [ref=e212]
        - paragraph [ref=e213]:
          - text: You have an injury now. You served then. But without a
          - strong [ref=e214]: Nexus Letter
          - text: linking the two medically, the VA assumes they are unrelated. This is the missing link for most veterans.
        - generic [ref=e215]:
          - img [ref=e216]
          - generic [ref=e218]: We build the Nexus for you.
  - generic [ref=e220]:
    - generic [ref=e221]:
      - heading "Fully Developed Claims vs. Standard Appeals" [level=2] [ref=e222]
      - paragraph [ref=e223]: We don’t just submit forms. We help you build a strong, evidence-based file so the VA has what it needs to decide your claim. In some cases, solid existing medical evidence means the VA may decide it doesn’t need an additional C&P exam, but that decision is always up to the VA.
