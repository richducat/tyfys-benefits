      - generic [ref=e227]:
        - generic [ref=e228]: "1"
        - heading "Discovery" [level=3] [ref=e229]
        - paragraph [ref=e230]: We "squeeze and drain" your records to find High Value claims you missed.
      - generic [ref=e231]:
        - generic [ref=e232]: "2"
        - heading "Strategy" [level=3] [ref=e233]
        - paragraph [ref=e234]: We create a Game Plan targeting specific conditions (PTSD, Back Pain, etc).
      - generic [ref=e235]:
        - generic [ref=e236]: "3"
        - heading "Private Evidence" [level=3] [ref=e237]
        - paragraph [ref=e238]: Our doctors write the Nexus Letters & DBQs needed to prove your claim.
      - generic [ref=e239]:
        - generic [ref=e240]: "4"
        - heading "Submission" [level=3] [ref=e241]
        - paragraph [ref=e242]: We help you submit your claim as a Fully Developed Claim with all available evidence up front. This approach can support faster VA review, but actual decision times are set by the VA and can vary from case to case.
  - generic [ref=e244]:
