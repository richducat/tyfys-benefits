      - text: Real Results
      - heading "Our 98% Success Rate Strategy" [level=2] [ref=e246]
      - paragraph [ref=e247]: To date, we haven’t seen a client’s rating reduced based on a claim we helped document. Past results don’t guarantee future outcomes—only the VA can increase or decrease your rating under its rules.
