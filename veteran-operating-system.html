<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TYFYS Redirect</title>
    <script>
      (function () {
        const hostname = String(window.location.hostname || "").toLowerCase();
        const isLocalRuntime = hostname === "localhost" || hostname === "127.0.0.1";
        const target = new URL(isLocalRuntime ? "/app-shell.html" : "https://app.tyfys.net/", window.location.href);
        const current = new URL(window.location.href);
        current.searchParams.forEach((value, key) => target.searchParams.set(key, value));
        window.location.replace(target.toString());
      })();
    </script>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #0f172a;
        color: #f8fafc;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
      }

      a {
        color: #93c5fd;
      }
    </style>
</head>
<body>
    <main>
        <h1>Opening TYFYS</h1>
        <p>You are being redirected to the standalone TYFYS app.</p>
        <p>If nothing happens, <a href="https://app.tyfys.net/">continue to app.tyfys.net</a>.</p>
    </main>
</body>
</html>
