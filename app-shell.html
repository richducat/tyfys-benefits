<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      const hostname = String(window.location.hostname || "").toLowerCase();
      const isLocalRuntime = hostname === "localhost" || hostname === "127.0.0.1";
      const isStandaloneAppHost =
        hostname === "app.tyfys.net" ||
        hostname === "www.app.tyfys.net" ||
        hostname === "api.tyfys.net" ||
        hostname === "www.api.tyfys.net";
      if (!isLocalRuntime && isStandaloneAppHost && window.location.pathname === "/app-shell.html") {
        const cleanUrl = new URL("/", window.location.origin);
        cleanUrl.search = window.location.search;
        cleanUrl.hash = window.location.hash;
        window.history.replaceState(null, "", cleanUrl.toString());
      }
    })();
  </script>
  <script>
    (function () {
      const hostname = String(window.location.hostname || "").toLowerCase();
      const isLocalRuntime = hostname === "localhost" || hostname === "127.0.0.1";
      if (isLocalRuntime) return;

      window.dataLayer = window.dataLayer || [];
      window.gtag = function () {
        window.dataLayer.push(arguments);
      };

      const gtagScript = document.createElement("script");
      gtagScript.async = true;
      gtagScript.src = "https://www.googletagmanager.com/gtag/js?id=G-L1PEBFCV9Q";
      document.head.appendChild(gtagScript);

      window.gtag("js", new Date());
      window.gtag("config", "G-L1PEBFCV9Q");
    })();
  </script>
  <meta charset="utf-8">

    rel="stylesheet"
  >
  <link rel="stylesheet" href="/tyfys-platform/app-tailwind.css?v=17">

  <script>
    (function () {
      const hostname = String(window.location.hostname || "").toLowerCase();
      const isLocalRuntime = hostname === "localhost" || hostname === "127.0.0.1";
      const isStandaloneAppHost =
        hostname === "app.tyfys.net" ||
        hostname === "www.app.tyfys.net" ||
        hostname === "api.tyfys.net" ||
        hostname === "www.api.tyfys.net" ||
        hostname.endsWith(".vercel.app") ||
        hostname.endsWith(".vercel-dns.com");

      window.__TYFYS_APP_CONFIG__ = {
        apiBase: isLocalRuntime || isStandaloneAppHost ? "" : "https://api.tyfys.net",
        runtime: "web"
      };
    })();
  </script>
  <script>
    (function () {
      const lockedViewport =
        "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover";
      const syncViewport = () => {
        const viewport = document.querySelector('meta[name="viewport"]');
        if (viewport && viewport.getAttribute("content") !== lockedViewport) {
          viewport.setAttribute("content", lockedViewport);
        }
      };
      const preventZoomGesture = (event) => {
        event.preventDefault();
      };
      const preventMultiTouchZoom = (event) => {
        if (event.touches && event.touches.length > 1) {
          event.preventDefault();
        }
      };
      let lastTouchEndAt = 0;

      syncViewport();
      document.addEventListener("DOMContentLoaded", syncViewport);
      document.addEventListener("gesturestart", preventZoomGesture, { passive: false });
      document.addEventListener("gesturechange", preventZoomGesture, { passive: false });
      document.addEventListener("gestureend", preventZoomGesture, { passive: false });
      document.addEventListener("touchmove", preventMultiTouchZoom, { passive: false });
      document.addEventListener(
        "touchend",
        (event) => {
          const now = Date.now();
          if (now - lastTouchEndAt <= 300) {
            event.preventDefault();
          }
          lastTouchEndAt = now;
        },
        { passive: false }
      );
    })();
  </script>
  <script defer src="/tyfys-platform/vendor/react.production.min.js"></script>
  <script defer src="/tyfys-platform/vendor/react-dom.production.min.js"></script>

      overscroll-behavior: none;
